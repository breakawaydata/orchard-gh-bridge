name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/orchard-gh-bridge

      - name: Template chart
        run: helm template test charts/orchard-gh-bridge

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: orchard-gh-bridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start Orchard controller
        run: |
          docker run -d --name orchard \
            -p 6120:6120 \
            -e ORCHARD_BOOTSTRAP_ADMIN_TOKEN=integration-test-token \
            ghcr.io/cirruslabs/orchard:latest \
            controller run --listen :6120 --insecure-no-tls

      - name: Wait for Orchard controller
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6120/v1/workers -u bootstrap-admin:integration-test-token > /dev/null 2>&1; then
              echo "Orchard controller is ready"
              exit 0
            fi
            echo "Waiting for Orchard controller... ($i/30)"
            sleep 2
          done
          echo "Orchard controller failed to start"
          docker logs orchard
          exit 1

      - name: Run integration tests
        env:
          ORCHARD_ADDRESS: http://localhost:6120
          ORCHARD_PASSWORD: integration-test-token
        run: go test -v -race -count=1 -tags=integration ./...

      - name: Stop Orchard controller
        if: always()
        run: docker stop orchard && docker rm orchard
